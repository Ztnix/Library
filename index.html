<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
</head>
<body>
    <div class="header">
        <div class="headerText">Your Online Library</div>
        <button id="headerButton">Add book</button>
    </div>

    <dialog id="dialog">
        <form method="dialog" id="bookForm" onsubmit="handleSubmit(event)">
            <p>Add New Book</p>
            <label for="title">Title</label>
            <input type="text" name="title" id="title" required="">
            <label for="author">Author</label>
            <input type="text" name="author" id="author" required="">
            <label for="pages">No. Pages</label>
            <input type="number" name="pages" id="pages" required="" min="1">

            <div class="checkboxContainer">
                <p>¿Read?</p>
                <input type="checkbox" name="read" id="read">
            </div>
          <button type="submit">Close</button>
        </form>
    </dialog>

    <div class="main">
        <div class="card">
            <p class="title">Game Of Thrones</p>
            <p class="author">by George R. R. Martin</p>
            <p class="numPages">694 Pages</p>
            <button class="readButton" id="readButton">Read</button><button class="deleteButton" id="deleteButton">Delete</button>
            <p class="completed">Not Completed</p>
        </div>
        <div class="card">
            <p class="title">Harry Potter</p>
            <p class="author">by J. K. Rowling</p>
            <p class="numPages">309 Pages</p>
            <button class="readButton" id="readButton">Read</button><button class="deleteButton" id="deleteButton">Delete</button>
            <p class="completed">Not Completed</p>
        </div>
    </div>
    <div class="footer">
        <p class="footerText">Ztnix</p>
    </div>



<script src="script.js"></script> 
</body>
</html>
